name: Production Deployment (CI/CD)

on:
  push:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  # WAJIB huruf kecil semua untuk Docker
  IMAGE_NAME: rusdinsjs/sumbu-peradaban-backend

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build Rust & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        
      - name: Cache Cargo Registry & Target
        uses: Swatinem/rust-cache@v2
        with:
          # Beritahu cache bahwa project Rust ada di dalam folder backend
          workspaces: |
            backend -> target

      - name: Compile Backend (Release Mode)
        run: cargo build --release
        working-directory: ./backend

      - name: Move Binary for Docker Context
        # Memindahkan hasil rakitan ke tempat yang bisa dijangkau Docker
        run: cp ./backend/target/release/sumbu-peradaban ./backend/sumbu-peradaban

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-to-vps:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deployment over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.134.17.13
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/sumbu-peradaban
            git pull origin main
            
            # Login sementara ke GHCR menggunakan token dari GitHub Actions
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Tarik image yang baru saja dibuat dan hidupkan sistem
            sudo docker compose -f docker-compose.prod.yml pull backend
            sudo docker compose -f docker-compose.prod.yml up -d
