name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Continuous Integration (CI)
  # ---------------------------------------------------------------------------
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend CI (Rust) ───────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check Backend Formatting
        run: cargo fmt --manifest-path backend/Cargo.toml --all -- --check

      - name: Check Backend Compiler
        run: cargo check --manifest-path backend/Cargo.toml

      # ── Frontend CI (SvelteKit) ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Check Frontend Compiler & Types
        run: npm run build --prefix frontend

  # ---------------------------------------------------------------------------
  # Stage 2: Continuous Deployment (CD)
  # ---------------------------------------------------------------------------
  deploy:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /home/rus/Ngoding/sumbu-peradaban || cd ~/sumbu-peradaban || cd /var/www/sumbu-peradaban
            git pull origin ${{ github.ref_name }}
            ./start.sh
