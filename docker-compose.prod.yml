services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: sumbu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sumbu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sumbu_peradaban}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sumbu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sumbu-net

  # ── Neo4j Community ────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: sumbu-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - ./data/neo4j:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - sumbu-net

  # ── Rust Backend (Pulled from GHCR) ────────────────────
  backend:
    image: ghcr.io/rusdinsjs/sumbu-peradaban-backend:latest
    container_name: sumbu-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sumbu}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sumbu_peradaban}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASS: ${NEO4J_PASSWORD:-changeme}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - sumbu-net

  # ── SvelteKit Frontend ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sumbu-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://super.sjsgroup.site}
      PUBLIC_MAPBOX_TOKEN: ${PUBLIC_MAPBOX_TOKEN:-}
      ORIGIN: ${ORIGIN:-https://super.sjsgroup.site}
    depends_on:
      - backend
    networks:
      - sumbu-net

  # ── Caddy Reverse Proxy ────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: sumbu-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - sumbu-net

volumes:
  postgres_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  caddy_data:
  caddy_config:

networks:
  sumbu-net:
    driver: bridge
